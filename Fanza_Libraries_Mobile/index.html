<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f7f7f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FVL Mobile">
    <title>FANZA Voice Library Mobile</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <h1>FANZA Voice Library</h1>

        <div class="primary-controls">
            <button id="toggleHtmlPanelBtn" type="button">HTML入力を開く</button>
            <button id="exportJsonBtn" type="button">JSON書き出し</button>
            <button id="importJsonMergeBtn" type="button">JSON追加</button>
            <button id="importJsonReplaceBtn" type="button">JSON置き換え</button>
            <input id="jsonFileInput" type="file" accept="application/json,.json" hidden>
        </div>
        
        <div id="jsonPreview" class="json-preview" hidden></div>
        <div id="syncInfo" class="sync-info" hidden></div>

        <div id="htmlPanel" class="html-panel" hidden>
            <div class="html-panel-actions">
                <button id="formatBtn" type="button">整形</button>
                <button id="importBtn" type="button">ライブラリ生成</button>
            </div>

            <textarea id="htmlInput" placeholder="PCで取得したHTML、または一覧HTMLを貼り付け"></textarea>

            <label class="checkbox-label">
                <input id="autoFormatCheck" type="checkbox" checked>
                貼り付け時に自動整形
            </label>
        </div>

        <div class="tab-buttons">
            <button id="allTabBtn" class="tab-btn active" type="button">全作品</button>
            <button id="favTabBtn" class="tab-btn" type="button">お気に入り</button>
            <button id="circleTabBtn" class="tab-btn" type="button">サークル別表示</button>
        </div>

        <div class="browse-controls">
            <select id="sortSelect">
                <option value="added">登録順</option>
                <option value="title">タイトル順</option>
                <option value="circle">サークル順</option>
            </select>

            <select id="itemsPerPageSelect">
                <option value="10">10件</option>
                <option value="20" selected>20件</option>
                <option value="30">30件</option>
                <option value="50">50件</option>
                <option value="100">100件</option>
                <option value="all">すべて</option>
            </select>
        </div>

        <div class="browse-controls">
            <span id="itemsPerPageInfo" class="items-per-page-info"></span>
            <input id="searchBox" type="text" placeholder="キーワード検索（AND / OR | / 除外 -）">
        </div>

        <div class="library-actions">
            <button id="resetFavBtn" type="button">お気に入りリセット</button>
            <button id="clearBtn" type="button" class="danger-btn">ライブラリ削除</button>
        </div>

        <div class="help-text">
            タグはタップで検索追加、長押し相当として右クリック系環境では削除。スマホでは作品編集からタグ削除できます。
        </div>

        <div id="searchChips" class="chip-wrap"></div>
        <div id="statusBar" class="status-bar" data-type="info"></div>
        <div id="emptyState" class="empty-state" hidden></div>

        <div id="library"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <div id="editModal" class="modal" hidden>
        <div class="modal-panel">
            <div class="modal-header">
                <h2>作品編集</h2>
                <button id="closeEditBtn" type="button" class="modal-close-btn" aria-label="閉じる">×</button>
            </div>
            
            <div class="modal-body">
                <label class="field-label">
                    <span>タイトル</span>
                    <input id="editTitleInput" type="text">
                </label>
            
                <label class="field-label">
                    <span>サークル</span>
                    <input id="editCircleInput" type="text">
                </label>
            
                <label class="field-label">
                    <span>URL</span>
                    <input id="editUrlInput" type="text">
                </label>
            
                <label class="field-label">
                    <span>サムネイルURL</span>
                    <input id="editThumbInput" type="text">
                </label>
            
                <label class="field-label">
                    <span>タグ（空白区切り）</span>
                    <input id="editTagsInput" type="text">
                    <small class="field-help">不要なタグはここから消せます</small>
                </label>
            
                <label class="checkbox-label">
                    <input id="editFavoriteInput" type="checkbox">
                    お気に入り
                </label>
            </div>
                <label class="field-label">
                    <span>タイトル</span>
                    <input id="editTitleInput" type="text">
                </label>

                <label class="field-label">
                    <span>サークル</span>
                    <input id="editCircleInput" type="text">
                </label>

                <label class="field-label">
                    <span>URL</span>
                    <input id="editUrlInput" type="text">
                </label>

                <label class="field-label">
                    <span>サムネイルURL</span>
                    <input id="editThumbInput" type="text">
                </label>

                <label class="field-label">
                    <span>タグ（空白区切り）</span>
                    <input id="editTagsInput" type="text">
                </label>

                <label class="checkbox-label">
                    <input id="editFavoriteInput" type="checkbox">
                    お気に入り
                </label>
            </div>

            <div class="modal-actions">
                <button id="saveEditBtn" type="button">保存</button>
                <button id="cancelEditBtn" type="button">キャンセル</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./service-worker.js").catch((error) => {
                    console.error("Service Worker registration failed:", error);
                });
            });
        }
    </script>
    </body>
    
    </html>
