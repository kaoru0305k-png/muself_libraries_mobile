<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オフライン - FVL Mobile</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        .wrap {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .panel {
            background: #fff;
            border: 1px solid #d8d8d8;
            border-radius: 12px;
            padding: 18px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 22px;
        }

        p {
            margin: 0 0 10px;
            line-height: 1.7;
            font-size: 14px;
        }

        button {
            min-height: 44px;
            padding: 8px 14px;
            border: 1px solid #888;
            border-radius: 8px;
            background: #fff;
            font: inherit;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="panel">
            <h1>オフラインです</h1>
            <p>ネットワークに接続できませんでした。</p>
            <p>一度読み込んだ画面やデータは利用できる場合があります。接続回復後に再読み込みしてください。</p>
            <button type="button" onclick="location.reload()">再読み込み</button>
        </div>
    </div>
</body>

</html>
